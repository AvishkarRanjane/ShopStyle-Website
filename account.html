<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - ShopStyle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-section">
                <a href="index.html" class="logo"><i class="fas fa-shopping-bag"></i> ShopStyle</a>
            </div>
            
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
            </ul>
            
            <div class="nav-right">
                <a href="cart.html" class="nav-icon"><i class="fas fa-shopping-cart"></i><span id="cart-count" class="badge">0</span></a>
            </div>
        </div>
    </nav>

    <!-- Account Section -->
    <section style="padding: 4rem 1rem; background: white; min-height: 60vh;">
        <div class="container">
            <h1 style="font-size: 2.5rem; text-align: center; margin-bottom: 3rem;">My Account</h1>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; max-width: 800px; margin: 0 auto;">
                <!-- Login Form -->
                <div>
                    <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Login</h2>
                    <form onsubmit="handleLogin(event)" style="display: flex; flex-direction: column; gap: 1rem;">
                        <input type="email" placeholder="Email Address" required style="padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 4px;">
                        <input type="password" placeholder="Password" required style="padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 4px;">
                        <button type="submit" class="btn-primary">Login</button>
                        <p style="text-align: center; color: #666;"><a href="#" style="color: #667eea;">Forgot Password?</a></p>
                    </form>
                </div>

                <!-- Register Form -->
                <div>
                    <h2 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Create Account</h2>
                    <form onsubmit="handleRegister(event)" style="display: flex; flex-direction: column; gap: 1rem;">
                        <input type="text" placeholder="Full Name" required style="padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 4px;">
                        <input type="email" placeholder="Email Address" required style="padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 4px;">
                        <input type="password" placeholder="Password" required style="padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 4px;">
                        <input type="password" placeholder="Confirm Password" required style="padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 4px;">
                        <button type="submit" class="btn-primary">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>ShopStyle</h4>
                    <p>Premium fashion store</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 ShopStyle. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            showNotification('Login successful!', 'success');
            e.target.reset();
        }

        function handleRegister(e) {
            e.preventDefault();
            showNotification('Account created successfully!', 'success');
            e.target.reset();
        }
    </script>
</body>
</html>
